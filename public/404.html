<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect — preserves the full path for BrowserRouter
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/?p=' +
      encodeURIComponent(l.pathname + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
